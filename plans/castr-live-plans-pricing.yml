specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Castr
providerId: castr-live
created: '2026-07-11'
modified: '2026-07-11'
reconciled: false
tags:
- Live Streaming
- Multistreaming
- Video Hosting
- VOD
- Plans
- Pricing
description: >-
  Castr sells subscription plans that bundle the platform and API access; the
  same documented REST API (https://api.castr.com/v2) is available on paid plans,
  and a free trial is offered. Plans are differentiated by concurrent streams,
  number of multistream destinations, upfront (ingest) bandwidth, player
  (delivery) bandwidth, and video storage rather than by per-API-call fees. Prices
  below are the annual-billing monthly-equivalent figures published on the Castr
  pricing page (annual billing saves up to ~20% versus monthly and can add bonus
  concurrent streams). Values were captured on the created date and should be
  re-verified on the pricing page.
notes: >-
  Castr does not price the API separately - API usage is included with a plan and
  bounded by that plan's concurrency, bandwidth, and storage allowances. Monthly
  (non-annual) billing is higher than the figures shown. Verify current tiers,
  allowances, and any add-ons at https://castr.com/pricing/ during reconciliation.
sources:
- https://castr.com/pricing/
- https://castr.com/live-video-api/
- https://developers.castr.com/docs/getting-started
