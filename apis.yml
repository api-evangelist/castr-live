aid: castr-live
url: https://raw.githubusercontent.com/api-evangelist/castr-live/refs/heads/main/apis.yml
name: Castr
kind: company
description: Castr is a live video streaming and multistreaming platform with video
  hosting (VOD), that lets you ingest a single RTMP/SRT source and restream it to
  multiple destinations, record and clip live streams, host and deliver on-demand
  video, run ultra-low-latency sub-second (WebRTC) streams, and embed a player.
  Castr exposes a documented, self-serve REST API at https://api.castr.com/v2 for
  managing live streams and their platform destinations, sub-second streams,
  video hosting folders and uploads, live-to-VOD recordings, activity/analytics
  logs and events, and webhook endpoints. Requests are authenticated with an API
  token issued from the account settings and sent in an authorization header.
