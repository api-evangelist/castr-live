actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Castr's own public API. Castr's API
    is request/response REST (https://api.castr.com/v2), and push-style event
    delivery to developers is via outbound HTTP webhooks rather than a WebSocket.
    The realtime media (RTMP/SRT ingest, HLS/WebRTC delivery, RTMP restreaming)
    are media transports, not a subscribe-style WebSocket API, so no AsyncAPI
    document was created.
