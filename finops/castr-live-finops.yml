meters:
- name: subscription
  description: Recurring plan fee for the subscribed Castr tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: upfront_bandwidth
  description: Ingest/multistream bandwidth consumed against the plan allowance.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - stream
- name: player_bandwidth
  description: Viewer-delivery bandwidth consumed against the plan allowance.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - stream
  - video
- name: storage
  description: Video hosting storage consumed against the plan allowance.
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - folder
- name: concurrent_streams
  description: Peak simultaneous streams relative to the plan's concurrency ceiling.
  unit: streams
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track upfront and player bandwidth, stored VOD volume, and peak concurrency against plan allowances per account.
- name: Allocation
  description: Name streams, folders, and webhook integrations per workload/team so bandwidth and storage map to internal cost centers.
- name: Optimization
  description: Right-size the plan to real concurrency and bandwidth needs, prune stored VOD, limit multistream destinations to those in use, and prefer annual billing to lower the effective monthly rate.
- name: Accountability
  description: Assign owners per stream/account and review monthly bandwidth and storage consumption against the plan before an upgrade is forced.
