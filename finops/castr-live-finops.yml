description: >-
  FinOps view of Castr spend. Castr is billed as a subscription (Starter through
  Events/OTT, plus custom/enterprise), where each tier bundles a fixed set of
  allowances - concurrent streams, multistream destinations, upfront (ingest)
  bandwidth, player (delivery) bandwidth, and video storage. The documented REST
  API is included with the subscription rather than metered separately, so the
  cost drivers are the plan fee and staying within (or upgrading past) the plan's
  bandwidth, storage, and concurrency allowances. Annual billing lowers the
  effective monthly rate versus monthly billing.
notes: >-
  Per-unit overage rates (if any) beyond plan allowances are not reconciled here;
  verify current tiers and overage handling on the Castr pricing page. The
  dominant cost levers are choosing the right tier for concurrency and bandwidth,
  and controlling delivery (player) bandwidth and stored VOD volume.
